<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>S.M.A.R.T. ストレージ資産管理台帳</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>S.M.A.R.T. ストレージ資産管理台帳 <span class="subtitle">常時接続しない手持ちストレージのスペック・状態記録用</span></h1>
    </header>

    <div class="accordion-section">
        <div class="accordion-toggle" onclick="toggleAccordion('cmdAccordion')">
            <span>📋 データ取得用コマンドを表示 (クリックして展開)</span>
            <span id="accordionIcon">▼</span>
        </div>
        <div id="cmdAccordion" class="accordion-content hidden">
            <div>対象ディスクを指定して以下を実行し、結果のJSONを出力させてください（枠内クリックでコピー）。</div>
            <div class="code-block-container">
                <code onclick="copyCommandText(this)">sudo smartctl -a --json /dev/diskX | pbcopy</code>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="paste-zone" id="pasteZone" tabindex="0">
            ここにフォーカスを合わせて JSON をペースト (Cmd+V / Ctrl+V)
        </div>
        <div class="btn-container">
            <button class="btn-success" onclick="rebuildDatabaseFromRaw()">全再読み込み（再構築）</button>
            <button class="btn-secondary" onclick="exportBackup()">バックアップ保存</button>
            <label for="fileInput" class="file-input-label">復元</label>
            <input type="file" id="fileInput" accept=".json" onchange="importBackup(event)">
        </div>
    </div>

    <div class="filter-section" id="filterContainer">
        <button class="filter-btn active" onclick="filterType('all', event)">すべて (<span id="count-all">0</span>)</button>
        <button class="filter-btn" onclick="filterType('nvme', event)">NVMe (<span id="count-nvme">0</span>)</button>
        <button class="filter-btn" onclick="filterType('sata-ssd', event)">SATA SSD (<span id="count-sata-ssd">0</span>)</button>
        <button class="filter-btn" onclick="filterType('sshd', event)">SSHD (<span id="count-sshd">0</span>)</button>
        <button class="filter-btn" onclick="filterType('hdd-25', event)">HDD 2.5"</button>
        <button class="filter-btn" onclick="filterType('hdd-35', event)">HDD 3.5"</button>
        <button class="filter-btn" onclick="filterType('emmc', event)">eMMC (<span id="count-emmc">0</span>)</button>
        <button class="filter-btn" onclick="filterType('unknown', event)">不明 (<span id="count-unknown">0</span>)</button>
    </div>

    <div class="storage-list">
        <table>
            <thead>
                <tr>
                    <th style="width: 140px;" onclick="sortTable('id')">操作/登録順</th>
                    <th style="width: 160px;" onclick="sortTable('vendor')">メーカー</th>
                    <th style="width: 120px;" onclick="sortTable('size_bytes')">容量</th>
                    <th onclick="sortTable('model')">モデル名</th>
                    <th style="width: 140px;" onclick="sortTable('customType')">分類</th>
                    <th style="width: 110px;" onclick="sortTable('health')">健康状態</th>
                    <th style="width: 200px;">残り寿命 / 不良セクタ</th>
                    <th style="width: 140px;" onclick="sortTable('tbw_val')">総書込量</th>
                    <th style="width: 220px;" onclick="sortTable('hours_val')">通電時間 / 電源回数</th>
                    <th style="width: 100px;" onclick="sortTable('temp_val')">温度</th>
                    <th>メモ欄 (クリックして編集)</th>
                </tr>
            </thead>
            <tbody id="storageTbody">
                </tbody>
        </table>
    </div>
</div>

<div id="toastNotification" class="toast-notification"></div>

<script src="js/app.js"></script>

</body>
</html>
